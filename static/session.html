<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Session — office_claude</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
</head>
<body class="session-body">
  <header>
    <div class="container inner">
      <div style="display:flex;align-items:center;gap:1rem;">
        <a href="/" class="btn btn-ghost btn-sm">← Dashboard</a>
        <h1 id="session-title">Session</h1>
      </div>
      <nav class="nav">
        <span class="username-badge" id="username-badge"></span>
        <button id="end-btn" class="btn btn-danger btn-sm">End Session</button>
      </nav>
    </div>
  </header>

  <div id="terminal-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script>
    const sessionId = window.location.pathname.split('/').pop();

    async function api(path, opts = {}) {
      const res = await fetch(path, opts);
      if (res.status === 401 || res.redirected) {
        window.location.href = '/auth/login';
        throw new Error('Unauthorized');
      }
      return res;
    }

    async function loadMeta() {
      try {
        const [meRes, sessRes] = await Promise.all([api('/api/me'), api('/api/sessions')]);
        const me = await meRes.json();
        document.getElementById('username-badge').textContent = me.username;
        const { sessions } = await sessRes.json();
        const sess = sessions.find(s => s.id === sessionId);
        if (sess) {
          document.getElementById('session-title').textContent = sess.codebase_name;
          document.title = sess.codebase_name + ' — office_claude';
        }
      } catch (e) {
        // ignore (auth redirect already in flight)
      }
    }

    // Terminal
    const term = new Terminal({
      cursorBlink: true,
      fontSize: 14,
      fontFamily: "'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace",
      theme: {
        background: '#0f1117',
        foreground: '#e2e8f0',
      },
      scrollback: 5000,
    });
    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    const termContainer = document.getElementById('terminal-container');

    function openTerminal() {
      if (termContainer.clientWidth === 0 || termContainer.clientHeight === 0) {
        requestAnimationFrame(openTerminal);
        return;
      }
      term.open(termContainer);
      fitAddon.fit();
    }
    openTerminal();

    // WebSocket
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const ws = new WebSocket(`${proto}//${location.host}/api/sessions/${sessionId}/ws`);
    ws.binaryType = 'arraybuffer';

    function sendResize() {
      if (ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
      }
    }

    ws.addEventListener('open', () => {
      try { fitAddon.fit(); } catch(e) {}
      sendResize();
      term.focus();
    });

    ws.addEventListener('message', (event) => {
      term.write(new Uint8Array(event.data));
    });

    ws.addEventListener('close', () => {
      term.write('\r\n\x1b[33m[Connection closed]\x1b[0m\r\n');
    });

    ws.addEventListener('error', () => {
      term.write('\r\n\x1b[31m[WebSocket error]\x1b[0m\r\n');
    });

    term.onData(data => {
      if (ws.readyState === WebSocket.OPEN) {
        ws.send(new TextEncoder().encode(data).buffer);
      }
    });

    // Resize handling
    const resizeObserver = new ResizeObserver(() => {
      try { fitAddon.fit(); } catch(e) {}
      sendResize();
    });
    resizeObserver.observe(termContainer);

    window.addEventListener('resize', () => {
      try { fitAddon.fit(); } catch(e) {}
      sendResize();
    });

    // End session
    document.getElementById('end-btn').addEventListener('click', async () => {
      if (!confirm('End this session? The temp copy of the codebase will be deleted.')) return;
      ws.close();
      try { await api('/api/sessions/' + sessionId, { method: 'DELETE' }); } catch (e) {}
      window.location.href = '/';
    });

    loadMeta();
  </script>
</body>
</html>
