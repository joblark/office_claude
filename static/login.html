<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — office_claude</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <h1>office_claude</h1>
      <p class="subtitle">Sign in to continue</p>
      <div id="error" class="alert alert-error hidden"></div>
      <form id="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" autocomplete="username" autofocus required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Sign in</button>
      </form>
    </div>
  </div>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button[type=submit]');
      btn.disabled = true;
      const errorEl = document.getElementById('error');
      errorEl.classList.add('hidden');

      const params = new URLSearchParams();
      params.set('username', document.getElementById('username').value);
      params.set('password', document.getElementById('password').value);

      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: params.toString(),
        redirect: 'follow',
      });

      if (res.ok || res.redirected) {
        window.location.href = res.url || '/';
      } else {
        const text = await res.text();
        errorEl.textContent = text.includes('Invalid') ? 'Invalid username or password.' : 'Login failed.';
        errorEl.classList.remove('hidden');
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
